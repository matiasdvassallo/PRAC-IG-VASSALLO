<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>PRECIO PRECIO</title>
</head>
<body>
    <form action="#" method="get">
        <h1><span>PRECIO PRECIO</span></h1>
            <fieldset>
                <legend>INGRESE EL PRECIO PRECIO</legend>
                <label for="precio">Precio:</label>
                <input type="number" id="precio" name="precio" required>
            </fieldset>
            <fieldset>
                <legend>DESCUENTO DESCUENTO</legend>
                <label for="descuento">Descuento esperado:</label>
                <input type="text" id="descuento" name="descuento" required>
            </fieldset>
            <fieldset>
                <legend>PRECIO PRECIO FINAL FINAL</legend>
                <label for="final">Precio final:</label>
                <input type="button" value="Calcular" id="final" name="final">
                <input type="text" id="resultado" name="resultado" readonly>
            </fieldset> 
    </form>
<script src="script.js"></script>
</body>
</html>
